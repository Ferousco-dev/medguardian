name: Release Android

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: Tag to publish, for example v1.0.3
        required: false

permissions:
  contents: write

jobs:
  build:
    name: Build APK and publish release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get

      - name: Resolve version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            BASE=$(grep '^version:' pubspec.yaml | sed 's/version: //' | cut -d'+' -f1)
            TAG="v${BASE}-${{ github.run_number }}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "build=${{ github.run_number }}" >> "$GITHUB_OUTPUT"

      - name: Build release APK
        run: |
          flutter build apk --release \
            --build-number=${{ steps.version.outputs.build }} \
            --dart-define=API_BASE_URL=${{ vars.API_BASE_URL }}

      - name: Build split APKs
        run: |
          flutter build apk --release --split-per-abi \
            --build-number=${{ steps.version.outputs.build }} \
            --dart-define=API_BASE_URL=${{ vars.API_BASE_URL }}

      - name: Rename artifacts
        run: |
          cd build/app/outputs/flutter-apk
          for f in *.apk; do
            mv "$f" "medguardian-${{ steps.version.outputs.tag }}-${f}"
          done
          ls -la

      - uses: actions/upload-artifact@v4
        with:
          name: apk
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 14

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: MedGuardian ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: build/app/outputs/flutter-apk/*.apk
